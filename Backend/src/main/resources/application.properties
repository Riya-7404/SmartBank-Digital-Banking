spring.application.name=Banking_system

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/smartbank_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Security / H2 Console (Optional)
spring.h2.console.enabled=true
# Hibernate ko force karein ki wo exact wahi column names use kare jo humne @Column mein diye hain
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl